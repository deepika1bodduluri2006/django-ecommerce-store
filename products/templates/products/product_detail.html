{% extends 'base.html' %}

{% block content %}

<div class="row">

    <div class="col-md-5">

        {% if product.image %}

        <img src="{{ product.image.url }}"
             class="img-fluid rounded shadow">

        {% endif %}

    </div>

    <div class="col-md-7">

        <span class="badge bg-primary">

            {{ product.category }}

        </span>

        <h2 class="mt-3">

            {{ product.name }}

        </h2>

        <h3 class="text-success">

            ₹{{ product.price }}

        </h3>

        <p>

            {{ product.description }}

        </p>

        <a href="{% url 'add_to_cart' product.id %}"
           class="btn btn-success">

            Add to Cart

        </a>

        <a href="{% url 'product_list' %}"
           class="btn btn-secondary">

            Back

        </a>

    </div>

</div>

{% endblock %}
